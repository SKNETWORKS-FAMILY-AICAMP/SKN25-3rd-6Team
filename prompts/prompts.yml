    \n예시 계산:\n당월 총 카드 사용액이 X,XXX원이라면:\n - 공과금 YYY원 (제외)\n - 카드론 ZZZ원 (제외)\n - 할부 이용액\
    \ AAA원 (제외)\n → 실적 산정액 = X,XXX - YYY - ZZZ - AAA = BBB원\n\n\n### 단계 8: 전월실적 vs\
    \ 전년도실적의 차이\n⚠️ 매우 중요! 카드마다 다른 기준을 사용합니다.\n\n【전월실적 (당월 혜택 기준)】\n- 기준: 전월 1일 ~\
    \ 말일까지의 총 카드 사용액\n- 용도: 당월 할인/포인트 제공 조건\n- 리셋: 매달 초기화\n- 예: \"4월 혜택은 3월 1일~31일\
    \ 사용액 기준\"\n\n【전년도실적 (연간 누적 기준)】\n- 기준: 전년도 1월 1일 ~ 12월 31일까지의 누적 사용액\n- 용도: 바우처/포인트\
    \ 제공, 카드 유지/구간 결정\n- 리셋: 매년 1월 1일\n- 예: \"2026년 바우처는 2025년 1월~12월 사용액이 300만원 이상이어야\
    \ 함\"\n\n차이점 정리표:\n| 항목 | 전월실적 | 전년도실적 |\n|------|--------|----------|\n| 기준 |\
    \ 1개월 | 12개월 |\n| 용도 | 당월 혜택 | 연간 특전 |\n| 리셋 주기 | 매달 | 매년 |\n| 예시 | 4월 할인은 3월\
